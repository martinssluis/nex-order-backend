# ===============================
# GENERAL APPLICATION SETTINGS
# ===============================

# Application name
spring.application.name=backend

# Active profile (test, dev, prod, etc.)
spring.profiles.active=test

# Prevents keeping the JPA session open until the end of the request
spring.jpa.open-in-view=false


# ===============================
# H2 DATABASE SETTINGS (IN-MEMORY)
# ===============================

# H2 in-memory database URL
spring.datasource.url=jdbc:h2:mem:nexorderdb

# Default H2 username
spring.datasource.username=sa

# Default H2 password
spring.datasource.password=

# Enables the H2 web console
spring.h2.console.enabled=true

# H2 console path
spring.h2.console.path=/h2-console


# ===============================
# JPA / HIBERNATE SETTINGS
# ===============================

# Shows SQL in the console
spring.jpa.show-sql=false

# Formats SQL output in the console
spring.jpa.properties.hibernate.format_sql=true


# ===============================
# SWAGGER / OPENAPI SETTINGS
# ===============================

# OpenAPI JSON docs endpoint
springdoc.api-docs.path=/api-docs

# Swagger UI path
springdoc.swagger-ui.path=/swagger

# Security Token Secret
api.security.token.secret=super-secret-key